aid: cresta
name: Cresta
description: >-
  Cresta is a Mountain View / Sunnyvale, California contact center AI company
  spun out of the Stanford AI Lab and founded in 2017 by Zayd Enam, Tim Shi,
  and Sebastian Thrun. The platform unifies human and AI agents for the
  enterprise contact center across voice, chat, and SMS, combining real-time
  agent assist, autonomous voice and digital AI agents, conversation
  intelligence, a knowledge agent, and automated quality management.
  Cresta runs a multi-model architecture composed of 20+ large and small
  language models, fine-tuned on customer-specific transcripts and synthetic
  data, with enterprise guardrails, supervisory models, and a no-code
  orchestration surface. The AI Agent supports API-based function calling
  and Model Context Protocol (MCP) for standardized tool access. Voice
  integrations span Five9, Genesys (Cloud CX and Engage), NICE CXone,
  Amazon Connect, Twilio Flex, Talkdesk, 8x8, Vonage, Gladly, TCN, RingCX,
  Avaya Infinity, Cisco UCCE/PCCE/UCCX, and SIPREC across Oracle, Ribbon,
  Avaya SBC, and Cisco CUBE via SIP, PSTN transfer, CCaaS native streaming,
  WebSocket, gRPC, and raw RTP. Cresta is privately held with $270M+ raised
  across rounds led by Greylock, Andreessen Horowitz, Sequoia, and Tiger
  Global, with strategic investors including Genesys, Five9, Accenture,
  Comcast, Qualcomm, JP Morgan, and Workday Ventures. The Cresta API and
  SDK are private and gated behind a customer / partner engagement; there
  is no public OpenAPI specification, no public SDK release, and no public
  developer self-service portal.
